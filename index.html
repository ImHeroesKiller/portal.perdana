    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LB6K5S1D5T"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      (function () {
        var GA_ID = 'G-LB6K5S1D5T';
        var gaDebug = false;
        try {
          gaDebug =
            window.location.hostname === 'localhost' ||
            window.location.hostname === '127.0.0.1' ||
            localStorage.getItem('ga_debug') === '1' ||
            /(?:^|[?&#])ga_debug=1(?:&|$|#)/.test(
              window.location.search + window.location.hash
            );
        } catch (e) {
          gaDebug = false;
        }

        if (gaDebug) {
          window.__GA_DEBUG__ = true;
          console.info('[GA4] debug_mode enabled — events appear in GA4 DebugView');
        }

        gtag('config', GA_ID, {
          send_page_view: false,
          debug_mode: gaDebug,
          allow_google_signals: true,
          allow_ad_personalization_signals: false,
          transport_type: 'beacon',
          cookie_flags: 'SameSite=None;Secure',
        });

        window.__GA_READY__ = true;
      })();
    </script>

    <title>ePortal — Perdana Adi Yuda</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

      :root {
        --pwa-brand: #003087;
        --pwa-bg: #ffffff;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--pwa-bg);
        margin: 0;
      }

      #pwa-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background: var(--pwa-bg);
        transition: opacity 0.35s ease, visibility 0.35s ease;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }

      #pwa-splash.pwa-splash--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #pwa-splash img {
        width: 96px;
        height: 96px;
        border-radius: 22%;
        object-fit: contain;
        box-shadow: 0 8px 32px rgba(0, 48, 135, 0.12);
      }

      #pwa-splash h1 {
        margin: 0;
        font-size: 1.375rem;
        font-weight: 700;
        color: var(--pwa-brand);
        letter-spacing: -0.02em;
      }

      #pwa-splash p {
        margin: -0.5rem 0 0;
        font-size: 0.8125rem;
        color: #64748b;
        font-weight: 500;
      }

      .pwa-splash__spinner {
        width: 28px;
        height: 28px;
        border: 3px solid #e2e8f0;
        border-top-color: var(--pwa-brand);
        border-radius: 50%;
        animation: pwa-spin 0.8s linear infinite;
      }

      @keyframes pwa-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="pwa-splash" role="status" aria-live="polite" aria-label="Memuat ePortal">
      <img src="/icons/icon-192.png" alt="" width="96" height="96" />
      <h1>ePortal</h1>
      <p>Perdana Adi Yuda</p>
      <div class="pwa-splash__spinner" aria-hidden="true"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js')
            .then(function (reg) {
              reg.addEventListener('updatefound', function () {
                var worker = reg.installing;
                if (!worker) return;
                worker.addEventListener('statechange', function () {
                  if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                    worker.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });
            })
            .catch(function (err) {
              console.warn('Service worker registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
