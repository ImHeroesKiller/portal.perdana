name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build

  smoke-production:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Ping health endpoint
        run: |
          curl -sfS "https://portal.perada.net/api/ping" | jq -e '.ok == true or .pong == true'

      - name: Firebase health endpoint
        run: |
          curl -sfS "https://portal.perada.net/api/firebase-health" | jq -e '.ok == true'